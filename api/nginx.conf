events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Minio Console Proxy
        location /minio/ {
            proxy_pass http://minio:9001/;
            proxy_set_header Host $host;
        }
    }
}
