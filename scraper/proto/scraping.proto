syntax = "proto3";

package scraping;

service ScrapingService {
  rpc SearchFlights(SearchRequest) returns (SearchResponse);
}

message SearchRequest {
  string origin      = 1;  // IATA airport code e.g. "OTP"
  string destination = 2;  // IATA airport code e.g. "BCN"
  string depart_date = 3;  // ISO-8601 date "YYYY-MM-DD"
  string return_date = 4;  // ISO-8601 date or empty string for one-way
  int32  adults      = 5;  // defaults to 1 if 0
  int32  children    = 6;
  bool   is_one_way  = 7;
}

message SearchResponse {
  repeated FlightOffer offers = 1;
}

message FlightOffer {
  string offer_id          = 1;
  string origin            = 2;
  string destination       = 3;
  string depart_date       = 4;
  string return_date       = 5;
  float  price_eur         = 6;
  string airline           = 7;
  string flight_number     = 8;
  int32  duration_minutes  = 9;
  int32  stops             = 10;
  string deep_link         = 11;
}
