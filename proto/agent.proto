syntax = "proto3";

package agent;

service AgentService {
  rpc Chat(ChatRequest) returns (ChatResponse);
}

message ChatRequest {
  string session_id    = 1;  // identifies the conversation session
  string user_message  = 2;  // raw user input
  repeated string image_urls = 3;  // internal MinIO URLs; empty for text-only messages
}

message ChatResponse {
  string reply = 1;
}
