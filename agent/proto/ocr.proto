syntax = "proto3";

package ocr;

service OcrService {
  rpc ExtractBookingInfo(ExtractBookingRequest) returns (ExtractBookingResponse);
}

message ExtractBookingRequest {
  string session_id = 1;
  string image_path = 2;
  string ocr_backend = 3;
}

message ExtractBookingResponse {
  bool success = 1;
  string summary = 2;
  optional string comparison_query_json = 3;
  optional string error = 4;
}
